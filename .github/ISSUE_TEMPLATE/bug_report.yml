name: Bug report
description: Report a reproducible defect in macchanger-pro
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include exact commands and environment details.
      placeholder: |
        1. Run command ...
        2. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Paste relevant output. Redact sensitive data.
      render: shell
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: v1.0.0 or commit SHA
    validations:
      required: true

